<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>밤학교에서</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 2em;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }
        .fade-content {
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }
        .fade-out {
            opacity: 0;
        }
        .credit-box {
            display: none;
            color: #d4af37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            font-weight: 300;
        }
        .credit-title {
            font-size: 0.6em;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div id="message" class="fade-content"></div>
    <div id="credit-box" class="fade-content credit-box">
        <div class="credit-title">Staff Credits</div>
        <div id="credit-content" style="font-size: 1.2em;"></div>
    </div>

    <script>
        function startSequence() {
            const messages = [
                "그렇게 나는 학교를 나왔다.",
                "한참을 걸어 집으로 돌아간다.",
                "숙제는... 이 정도는 못해가도 괜찮겠지?",
                "엔딩1 귀가"
            ];

            let index = 0;

            function showMessage() {
                if (index < messages.length) {
                    document.getElementById('message').innerText = messages[index];
                    index++;
                    setTimeout(showMessage, 3000);
                } else {
                    const messageEl = document.getElementById('message');
                    messageEl.classList.add('fade-out');
                    
                    setTimeout(() => {
                        messageEl.style.display = 'none';
                        const creditBox = document.getElementById('credit-box');
                        const creditContent = document.getElementById('credit-content');
                        
                        creditBox.style.display = 'block';
                        creditBox.classList.add('fade-out');
                        
                        setTimeout(() => {
                            creditContent.innerText = "배경, 코딩작업 : 빛나는 노란콩";
                            creditBox.classList.remove('fade-out');
                        }, 50);

                        setTimeout(() => {
                            creditBox.classList.add('fade-out');
                            
                            setTimeout(() => {
                                creditContent.innerText = "캐릭터 삽화 : 하움";
                                creditBox.classList.remove('fade-out');
                                
                                setTimeout(() => {
                                    creditBox.classList.add('fade-out');
                                    setTimeout(() => {
                                        window.location.href = "/";
                                    }, 800);
                                }, 2000);
                            }, 800);
                        }, 2800);
                    }, 800);
                }
            }

            showMessage();
        }

        window.onload = startSequence;
    </script>
</body>
</html>
