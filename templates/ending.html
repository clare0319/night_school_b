<!DOCTYPE html>
<html>
<head>
    <!-- 브라우저가 한글을 올바르게 인식하도록 meta 태그를 추가했습니다 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밤학교에서 - 성공</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 2em;
            text-align: center;
        }
        .fade-content {
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }
        .fade-out {
            opacity: 0;
        }
        .credit-box {
            display: none;
            color: #d4af37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            font-weight: 300;
        }
        .credit-title {
            font-size: 0.6em;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* 모바일 대응 미디어 쿼리 (가로폭 768px 이하) */
        @media (max-width: 768px) {
            body {
                font-size: 1.3em;
                padding: 20px;
            }
            .credit-box {
                width: 90%;
            }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div id="message" class="fade-content">후우... 힘든일이 많았다</div>
    <div id="credit-box" class="fade-content credit-box">
        <div class="credit-title">Staff Credits</div>
        <div id="credit-content" style="font-size: 1.2em;"></div>
    </div>

    <script>
        setTimeout(() => {
            // 1. "그래도 나는 성공했다..." 메시지 표시
            document.getElementById('message').innerText = '그래도 나는 성공했다. 이제 집에가면.. 숙제를 해야겠구만.';

            // 2. 2초 후 "엔딩 2" 표시
            setTimeout(() => {
                document.getElementById('message').innerText = '엔딩 2. 무사귀가';

                // 3. 3초 후 크레딧 표시
                setTimeout(() => {
                    const messageEl = document.getElementById('message');
                    messageEl.classList.add('fade-out');
                    
                    setTimeout(() => {
                        messageEl.style.display = 'none';
                        const creditBox = document.getElementById('credit-box');
                        const creditContent = document.getElementById('credit-content');
                        
                        creditBox.style.display = 'block';
                        creditBox.classList.add('fade-out');
                        
                        setTimeout(() => {
                            creditContent.innerText = "배경, 코딩작업 : 빛나는 노란콩";
                            creditBox.classList.remove('fade-out');
                        }, 50);

                        setTimeout(() => {
                            creditBox.classList.add('fade-out');
                            
                            setTimeout(() => {
                                creditContent.innerText = "캐릭터 삽화 : 하움";
                                creditBox.classList.remove('fade-out');
                                
                                setTimeout(() => {
                                    creditBox.classList.add('fade-out');
                                    setTimeout(() => {
                                        window.location.href = '/';
                                    }, 800);
                                }, 2000);
                            }, 800);
                        }, 2800);
                    }, 800);
                }, 3000);
            }, 2000);
        }, 2000); // 맨 처음 2초 딜레이
    </script>
</body>
</html>
