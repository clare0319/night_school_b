<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>밤학교에서</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dokdo&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black; /* 어두운 배경색 */
            color: red;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Dokdo', sans-serif;
            position: relative; /* 자식 요소의 position 기준 */
            overflow: hidden; /* 스크롤바 숨김 */
            min-height: 100vh; /* 최소 높이를 화면 전체로 */
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1; /* 내용을 가리지 않도록 뒤로 보냄 */
        }
        h1 {
            font-size: 7em; /* 제목 글자 크기 증가 */
        }
        a.button {
            display: inline-block;
            padding: 10px 20px;
            background-color: transparent;
            color: red;
            text-decoration: none;
            border: none;
            margin-top: 20px;
            font-size: 3.5em; /* 버튼 글자 크기 증가 */
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <h1>밤학교에서</h1>
    <a href="/start" class="button">시작하기</a>
    <a href="/restart_confirm" class="button">다시하기</a>
</body>
</html>
