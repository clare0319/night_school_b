<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>밤학교에서</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='화장실.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
        .dialog-box {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 25%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: black;
            font-size: 1.2em;
            z-index: 2;
            display: none; /* Hidden until flicker ends */
        }
        .choices {
            position: absolute;
            bottom: 35%;
            right: 5%;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 3;
            display: none; /* Hidden until flicker ends */
        }
        .choice-button {
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 20px;
            padding: 10px 25px;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1em;
            cursor: pointer;
            width: auto;
            max-width: 400px;
        }
        #flicker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>

    <div id="flicker-overlay"></div>

    <div class="choices" id="choices-container">
        <a href="{{ url_for('chaeyul_intro') }}"><button class="choice-button">거울을 살펴본다</button></a>
    </div>

    <div class="dialog-box" id="dialog-container">
        <p>뭐지...? 겨울에 뭔가 보이는거 같다....</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById("flicker-overlay");
            const dialog = document.getElementById("dialog-container");
            const choices = document.getElementById("choices-container");
            
            // Rapidly toggle visibility of black overlay
            let flickerInterval = setInterval(() => {
                if (overlay.style.display === "none") {
                    overlay.style.display = "block";
                } else {
                    overlay.style.display = "none";
                }
            }, 80); // Toggle every 80ms for rapid flicker

            // Stop flickering after 3 seconds (3000ms)
            setTimeout(() => {
                clearInterval(flickerInterval);
                overlay.style.display = "none"; // Ensure black overlay is completely gone
                dialog.style.display = "block"; // Show dialogue
                choices.style.display = "flex"; // Show options
            }, 3000);
        });
    </script>
</body>
</html>
