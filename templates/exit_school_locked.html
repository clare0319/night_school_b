<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>밤학교에서</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
        .dialog-box {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 25%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: black;
            font-size: 1.2em;
            z-index: 2;
        }
        .choices {
            position: absolute;
            bottom: 35%;
            right: 5%;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 3;
        }
        .choice-button {
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 20px;
            padding: 10px 25px;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1em;
            cursor: pointer;
            width: auto;
            max-width: 400px;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>

    <div class="choices">
        {% if has_key %}
            <a href="{{ url_for('open_door_ending') }}"><button class="choice-button">예</button></a>
            <a href="{{ url_for('first_floor') }}"><button class="choice-button">아니요</button></a>
        {% else %}
            <a href="{{ url_for('first_floor') }}"><button class="choice-button">돌아가기</button></a>
        {% endif %}
    </div>

    <div class="dialog-box">
        {% if has_key %}
            <p>정문 열쇠가 있다. 문을 열고 나갈까?</p>
        {% else %}
            <p>문이 굳게 잠겨있다. 열리지 않는다... 열쇠를 찾아야 할 것 같다.</p>
        {% endif %}
    </div>

</body>
</html>
