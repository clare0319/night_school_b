{% if modal %}
<style>
    .modal-bag-shell {
        background: rgba(0, 0, 0, 0.92);
        border: 2px solid white;
        border-radius: 20px;
        padding: 32px;
        color: white;
        font-family: 'Noto Sans KR', sans-serif;
        width: 100%;
        max-width: 760px;
        max-height: 80vh;
        overflow-y: auto;
        box-sizing: border-box;
        position: relative;
    }
    .modal-bag-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid white;
        padding-bottom: 10px;
        margin-bottom: 16px;
    }
    .modal-bag-header h2 {
        margin: 0;
        border: none;
        padding: 0;
    }
    .modal-bag-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 20px;
    }
    .modal-bag-link {
        color: white;
        text-decoration: none;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        text-align: center;
        transition: background 0.3s;
    }
    .modal-bag-link:hover {
        background-color: rgba(255, 255, 255, 0.1);
    }
    .modal-bag-close {
        background-color: rgba(255, 255, 255, 0.2);
        border: 2px solid white;
        border-radius: 10px;
        padding: 8px 16px;
        color: white;
        font-size: 1em;
        cursor: pointer;
    }
    .modal-bag-close:hover {
        background-color: rgba(255, 255, 255, 0.4);
    }
</style>
<div class="modal-bag-shell">
    <div class="modal-bag-header">
        <h2>아이템</h2>
        <button type="button" onclick="closeItemModal()" class="modal-bag-close">나가기</button>
    </div>
    {% if items %}
    <div class="modal-bag-grid">
        {% for item in items %}
            <a href="{{ url_for('item_detail', item_name=item) }}" class="modal-bag-link" data-item-link="true" data-item-name="{{ item }}">{{ item }}</a>
        {% endfor %}
    </div>
    {% else %}
        <p>아이템 목록.</p>
    {% endif %}
</div>
{% else %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밤학교에서 - 아이템목록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 1;
        }
        .item-list-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 70%;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid white;
            z-index: 2;
            overflow-y: auto;
        }
        .bag-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .bag-header h2 {
            margin: 0;
            border: none;
            padding: 0;
        }
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item-link {
            color: white;
            text-decoration: none;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            text-align: center;
            transition: background 0.3s;
        }
        .item-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .exit-button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            padding: 10px 25px;
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-block;
            cursor: pointer;
        }
        .exit-button:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>

    <div class="item-list-container">
        <div class="bag-header">
            <h2>아이템</h2>
            <a href="{{ prev_url }}" class="exit-button">나가기</a>
        </div>
        {% if items %}
        <div class="item-grid">
            {% for item in items %}
                <a href="{{ url_for('item_detail', item_name=item) }}" class="item-link">{{ item }}</a>
            {% endfor %}
        </div>
        {% else %}
            <p>아이템이 없습니다.</p>
        {% endif %}
    </div>

</body>
</html>
{% endif %}
