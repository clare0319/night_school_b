<!DOCTYPE html>
<html>
<head>
    <title>밤학교에서 - 1층</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>

    <div class="bag-button-container">
        <button class="choice-button" onclick="window.openItemModal(); return false;">아이템</button>
    </div>

    <div class="choices">
        <a href="/office"><button class="choice-button">교무실</button></a>
        <a href="/restroom"><button class="choice-button">화장실</button></a>
        <a href="/class_selection_1f"><button class="choice-button">교실로 이동</button></a>
        <a href="/stairs"><button class="choice-button">다른 층으로</button></a>
        <a href="/exit_school"><button class="choice-button">학교 나가기</button></a>
    </div>

    <div class="dialog-box">
        <p id="dialog-text">{{ message or '1층이다. 어디로 갈까?' }}</p>
    </div>
    <script src="{{ url_for('static', filename='item_modal.js') }}"></script>
</body>
</html>
