<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>5층 노래</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white; /* Reverted to white */
            text-align: center;
            font-family: 'Noto Sans KR', sans-serif; /* Reverted to original font */
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 50px;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/학교.png');
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
        .content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
        }
        .dialogue-box {
            background-color: rgba(0, 0, 0, 0.4); /* Reverted to original */
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 80%;
            border: 1px solid white; /* Reverted to original */
            color: white; /* Reverted to original */
        }
        .dialogue {
            font-size: 22px;
        }
        .options a {
            display: block;
            background-color: rgba(0, 0, 0, 0.4); /* Reverted to original */
            border: 1px solid white; /* Reverted to original */
            color: white; /* Reverted to original */
            padding: 15px;
            margin: 10px auto;
            max-width: 70%;
            text-decoration: none;
            border-radius: 10px;
            font-size: 20px;
        }
        .options a:hover {
            background-color: #333;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div class="content-wrapper">
        <div class="dialogue-box">
            <p class="dialogue">카세트를 넣었다. 이제 무엇을 할까?</p>
        </div>
        <div class="options">
            <a href="{{ url_for('sing_and_start_cheongryeo') }}">재생 시작</a>
            <a href="{{ url_for('fifth_floor_main') }}">아니요</a>
        </div>
    </div>
</body>
</html>
