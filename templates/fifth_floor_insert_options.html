<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>5층탐색</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            background-image: url('/static/강당.png'); /* Assuming auditorium background */
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 50px;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 1;
        }
        .content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
        }
        .dialogue-box {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 80%;
            border: 1px solid white;
        }
        .dialogue {
            font-size: 22px;
        }
        .options a {
            display: block;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid white;
            color: white;
            padding: 15px;
            margin: 10px auto;
            max-width: 70%;
            text-decoration: none;
            border-radius: 10px;
            font-size: 20px;
        }
        .options a:hover {
            background-color: #333;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div class="content-wrapper">
        <div class="dialogue-box">
            {% if has_cassette_tape %}
            <p class="dialogue">뭘 넣어볼까</p>
            {% else %}
            <p class="dialogue">재생할 수 있는게 없다. 찾아볼까?</p>
            {% endif %}
        </div>
        <div class="options">
            {% if has_cassette_tape %}
            <a href="/fifth_floor_insert_cassette_tape">(카세트 테이프 넣기)</a>
            {% endif %}
            <a href="/fifth_floor/main">돌아가기</a>
        </div>
    </div>
</body>
</html>
