<!DOCTYPE html>

        body {
            background-color: black; /* Added */

            left: 0;

            height: 100%;

            background-position: center;
            opacity: 1;
            z-index: -1; /* Added z-index */
        }
        .explore-button {
            background-color: rgba(0, 0, 0, 0.7); /* Reverted to original */
            color: white; /* Reverted to white */
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid white; /* Reverted to original */
        }
        .explore-button:hover {
            background-color: rgba(255, 255, 255, 0.2); /* Reverted hover effect */
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
