<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밤학교에서 - 게임 시작</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }        .dialog-box {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 25%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: black;
            font-size: 1.2em;
            z-index: 2;
        }
        .choices {
            position: absolute;
            bottom: 35%;
            right: 5%;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 3;
        }
        .choice-button {
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 20px;
            padding: 10px 25px;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1em;
            cursor: pointer;
            width: auto;
            max-width: 400px;
        }
        
        /* 모바일 대응 미디어 쿼리 (가로폭 768px 이하) */
        @media (max-width: 768px) {
            .dialog-box {
                font-size: 1em;
                height: 30%;
                padding: 15px;
            }
            .choices {
                bottom: 40%;
                width: 90%;
            }
            .choice-button {
                font-size: 0.9em;
                padding: 8px 16px;
                width: 100%;
                max-width: none;
            }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <!-- 검은색 페이드 오버레이 레이어 -->
    <div id="start-fade-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; z-index: 9999; transition: opacity 1.5s ease-in-out; pointer-events: none; opacity: 1;"></div>

    <div id="choices-container" class="choices">
        <button class="choice-button" onclick="proceed()">...</button>
    </div>

    <div class="dialog-box">
        <p id="dialog-text">한밤중의 학교. 내일까지 해야 하는 숙제를 학교에 두고 와버렸다.</p>
    </div>

    <script>
        function proceed() {
            // 대사 내용 변경
            document.getElementById('dialog-text').innerHTML = '내 교실은 3학년 1반.. 내 교실로 가야한다.<br>우선 계단으로 가볼까';

            // 선택지 변경
            document.getElementById('choices-container').innerHTML = '<a href="/stairs"><button class="choice-button">계단으로 이동</button></a>';
        }

        // 페이지 로드 시 검은 화면에서 부드럽게 밝아지는 연출
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('start-fade-overlay');
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500);
            }, 100);
        });
    </script>
</body>
</html>
