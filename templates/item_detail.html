{% if modal %}
<style>
    .modal-item-shell {
        background: rgba(0, 0, 0, 0.92);
        border: 2px solid white;
        border-radius: 20px;
        padding: 32px 32px 72px;
        color: white;
        font-family: 'Noto Sans KR', sans-serif;
        width: 100%;
        max-width: 760px;
        box-sizing: border-box;
        position: relative;
        text-align: center;
    }
    .modal-item-shell h2 {
        color: #ffcc00;
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 2em;
    }
    .modal-item-shell p {
        font-size: 1.2em;
        line-height: 1.6;
        margin-bottom: 20px;
    }
    .modal-item-close {
        background-color: rgba(255, 255, 255, 0.2);
        border: 2px solid white;
        border-radius: 10px;
        padding: 8px 16px;
        color: white;
        font-size: 1em;
        cursor: pointer;
        position: absolute;
        right: 20px;
        bottom: 20px;
    }
    .modal-item-close:hover {
        background-color: rgba(255, 255, 255, 0.4);
    }
</style>
<div class="modal-item-shell">
    <h2>{{ item_name }}</h2>
    <p>{{ message }}</p>
    <button type="button" onclick="window.openItemModal(); return false;" class="modal-item-close">나가기</button>
</div>
{% else %}
<!DOCTYPE html>
<html>
<head>
    <title>밤학교에서 - 아이템?곸꽭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
            background-image: url("{{ url_for('static', filename=background_image|default('학교.png')) }}");
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 1;
        }
        .item-detail-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            max-width: 600px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid white;
            z-index: 2;
            text-align: center;
        }
        h2 {
            color: #ffcc00; /* ?⑷툑?됱쑝濡?媛뺤“ */
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2em;
        }
        p {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .exit-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
        }
        .exit-button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            padding: 10px 25px;
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-block;
            cursor: pointer;
        }
        .exit-button:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>

    <div class="item-detail-container">
        <h2>{{ item_name }}</h2>
        <p>{{ message }}</p>
    </div>

    <div class="exit-container">
        <a href="{{ exit_url or '/bag' }}" class="exit-button">나가기</a>
    </div>

</body>
</html>
{% endif %}
