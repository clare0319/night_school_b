<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채율</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
            background-image: url('/static/거울.png');
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 1;
        }
        .dialog-box {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 25%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: black;
            font-size: 1.2em;
            z-index: 2;
        }
        .character-container {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 2;
            pointer-events: none;
        }
        .character-image {
            position: fixed;
            left: 50% !important;
            transform: translateX(-50%) !important;
            transform-origin: bottom center;
            bottom: calc(var(--ui-dialog-bottom) + var(--ui-dialog-height) - 6px) !important;
            width: min(78vw, 1080px) !important;
            max-width: none !important;
            max-height: calc(100vh - (var(--ui-dialog-bottom) + var(--ui-dialog-height)));
            height: auto;
            opacity: 0.7;
            z-index: 2;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div class="character-container">
        <img class="character-image" src="/static/채율1.png" alt="채율">
    </div>

    <div class="dialog-box">
        <p>채율 : 그래 잘 다녀와</p>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "{{ url_for('restroom_3f') }}";
        }, 2000);
    </script>
</body>
</html>
