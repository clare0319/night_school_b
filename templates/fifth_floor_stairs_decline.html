<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밤학교에서 - 5층 계단</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{{ url_for('static', filename='학교.png') }}");
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: -1;
        }
        .dialog-box {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: black;
            font-size: 1.2em;
            z-index: 2;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_ui.css') }}">
</head>
<body>
    <div class="dialog-box">
        <p>나중에 가보자</p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = '/fourth_floor';
        }, 3000);
    </script>
</body>
</html>
